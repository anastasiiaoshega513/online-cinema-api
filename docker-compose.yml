services:
  db:
    image: postgres:17
    container_name: online_cinema_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - online_cinema_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h 127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7
    container_name: online_cinema_redis
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: online_cinema_web
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app

  celery-worker:
    build: .
    container_name: online_cinema_celery_worker
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A app.celery_app:celery_app worker --loglevel=info
    volumes:
      - .:/app

  celery-beat:
    build: .
    container_name: online_cinema_celery_beat
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A app.celery_app:celery_app beat --loglevel=info
    volumes:
      - .:/app

volumes:
  online_cinema_postgres_data:
